name: Merc Score Daily

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 AM UTC — adjust to suit your faction's timezone
  workflow_dispatch:         # also allows manual runs from the Actions tab

permissions:
  contents: write            # needed to commit merc_score.png and the DB back to the repo

jobs:
  scoreboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate scoreboard
        env:
          TORN_API_KEY: ${{ secrets.TORN_API_KEY }}
        run: python faction_merc_score.py

      - name: Commit updated image and DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merc_score.png torn_tracker_50888.db
          git diff --staged --quiet || git commit -m "chore: update merc scoreboard [skip ci]"
          git push
