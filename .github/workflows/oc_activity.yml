name: OC Activity Daily

on:
  schedule:
    - cron: '30 10 * * *'   # 10:30 AM UTC — offset from other score workflows
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-main-pushes
  cancel-in-progress: false

jobs:
  scoreboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate scoreboard
        env:
          TORN_API_KEY: ${{ secrets.TORN_API_KEY }}
        run: python faction_oc_activity.py

      - name: Commit updated image
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oc_activity.png
          git diff --staged --quiet || git commit -m "chore: update OC activity scoreboard [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push
